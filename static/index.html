<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HANII</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #a78bfa;
    --accent2: #7c3aed;
    --text: #e8e8f0;
    --text-dim: #6b6b8a;
    --hanii: #c4b5fd;
    --user: #818cf8;
    --danger: #f87171;
    --glow: rgba(167,139,250,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: white;
    box-shadow: 0 0 20px var(--glow);
    flex-shrink: 0;
    position: relative;
  }

  .avatar::after {
    content: '';
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 9px;
    height: 9px;
    background: #4ade80;
    border-radius: 50%;
    border: 2px solid var(--surface);
  }

  .header-info h1 {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--hanii);
    letter-spacing: 0.05em;
  }

  .header-info p {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    font-family: 'Space Mono', monospace;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  .stat-pill span.val {
    color: var(--accent);
    font-weight: 700;
  }

  .reset-btn {
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: var(--danger);
    color: var(--danger);
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease;
    max-width: 720px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    flex-direction: row-reverse;
    margin-left: auto;
  }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.hanii .msg-avatar {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: white;
    box-shadow: 0 0 12px var(--glow);
  }

  .msg.user .msg-avatar {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--user);
  }

  .msg-content {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .msg-name {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--text-dim);
  }

  .msg.hanii .msg-name { color: var(--hanii); }
  .msg.user .msg-name { text-align: right; color: var(--user); }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.7;
    max-width: 520px;
    word-break: break-word;
  }

  .msg.hanii .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, #4c1d95, #5b21b6);
    border: 1px solid rgba(167,139,250,0.3);
    border-top-right-radius: 4px;
    color: white;
  }

  .msg-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    border: 1px solid;
  }

  .tag.emotion { border-color: rgba(167,139,250,0.4); color: var(--accent); background: rgba(167,139,250,0.08); }
  .tag.mode { border-color: rgba(129,140,248,0.4); color: #a5b4fc; background: rgba(129,140,248,0.08); }
  .tag.action { border-color: rgba(196,181,253,0.3); color: #ddd6fe; background: rgba(196,181,253,0.05); }

  .loading-msg {
    display: flex;
    gap: 12px;
    max-width: 720px;
    animation: fadeUp 0.3s ease;
  }

  .loading-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
    box-shadow: 0 0 12px var(--glow);
  }

  .loading-bubble {
    padding: 14px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-top-left-radius: 4px;
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 18px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 16px;
    opacity: 0.6;
    text-align: center;
  }

  .welcome-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: white;
    box-shadow: 0 0 40px var(--glow);
  }

  .welcome h2 {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: var(--hanii);
  }

  .welcome p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .input-area {
    padding: 16px 24px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    position: relative;
    z-index: 10;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    resize: none;
    line-height: 1.6;
    max-height: 120px;
    min-height: 22px;
  }

  textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 16px var(--glow); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 16px; height: 16px; fill: white; }

  .hint {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 8px;
    font-family: 'Space Mono', monospace;
  }

  .error-msg {
    padding: 10px 16px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 10px;
    color: var(--danger);
    font-size: 13px;
    animation: fadeUp 0.3s ease;
  }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">H</div>
  <div class="header-info">
    <h1>HANII</h1>
    <p>AI 버튜버 · 온라인</p>
  </div>
  <div class="header-right">
    <div class="stat-pill">신뢰 <span class="val" id="trust-val">0.00</span></div>
    <div class="stat-pill">단계 <span class="val" id="stage-val">1</span></div>
    <button class="reset-btn" onclick="resetChat()">초기화</button>
  </div>
</div>

<div class="chat-area" id="chat-area">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">H</div>
    <h2>HANII</h2>
    <p>인공지능 버튜버 하니입니다<br>말 걸어봐~ 내가 상대해줄게</p>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="msg-input" placeholder="메시지 입력..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="hint">Enter 전송 · Shift+Enter 줄바꿈</div>
</div>

<script>
  // API URL = 현재 도메인 (같은 서버에서 서빙되므로 자동)
  const API_URL = '';
  let isLoading = false;
  const USER_ID = 'viewer_' + Math.random().toString(36).substr(2, 6);

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function scrollBottom() {
    const area = document.getElementById('chat-area');
    area.scrollTop = area.scrollHeight;
  }

  function addUserMsg(text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const area = document.getElementById('chat-area');
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `
      <div class="msg-avatar">나</div>
      <div class="msg-content">
        <div class="msg-name">viewer</div>
        <div class="msg-bubble">${escHtml(text)}</div>
      </div>
    `;
    area.appendChild(div);
    scrollBottom();
  }

  function addLoadingMsg() {
    const area = document.getElementById('chat-area');
    const div = document.createElement('div');
    div.className = 'loading-msg';
    div.id = 'loading-msg';
    div.innerHTML = `
      <div class="loading-avatar">H</div>
      <div class="loading-bubble">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    `;
    area.appendChild(div);
    scrollBottom();
  }

  function removeLoading() {
    const el = document.getElementById('loading-msg');
    if (el) el.remove();
  }

  function addHaniiMsg(text, state, plan) {
    const area = document.getElementById('chat-area');
    const div = document.createElement('div');
    div.className = 'msg hanii';

    let tags = '';
    if (state) {
      if (state.emotion) tags += `<span class="tag emotion">${state.emotion}</span>`;
      if (state.mode) tags += `<span class="tag mode">${state.mode}</span>`;
    }
    if (plan && plan.action) tags += `<span class="tag action">${plan.action}</span>`;

    div.innerHTML = `
      <div class="msg-avatar">H</div>
      <div class="msg-content">
        <div class="msg-name">HANII</div>
        <div class="msg-bubble">${escHtml(text)}</div>
        ${tags ? `<div class="msg-meta">${tags}</div>` : ''}
      </div>
    `;
    area.appendChild(div);
    scrollBottom();

    if (state) {
      if (state.trust !== undefined) document.getElementById('trust-val').textContent = state.trust.toFixed(2);
      if (state.stage !== undefined) document.getElementById('stage-val').textContent = state.stage;
    }
  }

  function addErrorMsg(text) {
    const area = document.getElementById('chat-area');
    const div = document.createElement('div');
    div.className = 'error-msg';
    div.textContent = '⚠ ' + text;
    area.appendChild(div);
    scrollBottom();
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    addUserMsg(text);
    addLoadingMsg();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, user_id: USER_ID })
      });

      if (!res.ok) throw new Error(`서버 오류 ${res.status}`);
      const data = await res.json();

      removeLoading();
      const reply = data.response || '....';
      addHaniiMsg(reply, data.state, data.plan);

    } catch (e) {
      removeLoading();
      addErrorMsg(e.message || '연결 실패');
    } finally {
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  async function resetChat() {
    try {
      await fetch('/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: USER_ID })
      });
    } catch(e) {}

    document.getElementById('chat-area').innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">H</div>
        <h2>HANII</h2>
        <p>인공지능 버튜버 하니입니다<br>말 걸어봐~ 내가 상대해줄게</p>
      </div>
    `;
    document.getElementById('trust-val').textContent = '0.00';
    document.getElementById('stage-val').textContent = '1';
  }

  function escHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
</script>
</body>
</html>
